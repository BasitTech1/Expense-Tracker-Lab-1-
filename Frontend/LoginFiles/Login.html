<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>Login</title>
</head>

<body>
    <div class="Login">
        <div class="title">
            <h1>Login</h1>
        </div>
        <form id="loginForm">
            <div class="email">
                <label for="Email">Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter Your Email">
            </div>
            <div class="Pass">
                <label for="Password">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <div id="errorMessage" style="color: red; display: none; margin: 10px 0;">Invalid email or password!</div>
            <button type="submit">Login</button>
            <div class="SignUpBtn">
                <p>Already You account?</p>
                <a href="../SignUpFiles/Signup.html">Sign Up</a>
            </div>
        </form>
    </div>
    <script src="Script.js"></script>
</body>

</html>
