<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - All Transactions</title>
    <link rel="stylesheet" href="../AdminFiles/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <div class="admin-sidebar">
        <div class="sidebar-header">
          <h2>Group 3</h2>
          <span>Admin Panel</span>
        </div>
        <div class="sidebar-menu">
          <a href="admin-dashboard.html">
            <i class="fa-solid fa-gauge-high"></i>
            <span>Dashboard</span>
          </a>
          <a href="admin-users.html">
            <i class="fa-solid fa-users"></i>
            <span>Users</span>
          </a>
          <a class="active" href="admin-transactions.html">
            <i class="fa-solid fa-money-bill-transfer"></i>
            <span>Transactions</span>
          </a>
          <a href="admin-categories.html">
            <i class="fa-solid fa-tags"></i>
            <span>Categories</span>
          </a>
          <a href="admin-reports.html">
            <i class="fa-solid fa-chart-line"></i>
            <span>Reports</span>
          </a>
        </div>
        <div class="sidebar-footer">
          <a href="../IndexFiles/Index.html">
            <i class="fa-solid fa-house"></i>
            <span>Back to Site</span>
          </a>
          <a href="#" onclick="logoutAdmin(event)">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="admin-main">
        <div class="admin-header">
          <h1>
            <i class="fa-solid fa-money-bill-transfer"></i> All Transactions
          </h1>
          <div class="admin-user">
            <span class="admin-badge">Administrator</span>
          </div>
        </div>

        <!-- Filters -->
        <div class="filter-bar">
          <div class="search-box">
            <i class="fa-solid fa-search"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search by description..."
            />
          </div>
          <select id="typeFilter">
            <option value="">All Types</option>
            <option value="Income">Income</option>
            <option value="Expense">Expense</option>
          </select>
          <input type="date" id="startDate" title="Start Date" />
          <input type="date" id="endDate" title="End Date" />
          <button onclick="loadTransactions()" class="btn-refresh">
            <i class="fa-solid fa-rotate"></i> Refresh
          </button>
        </div>

        <!-- Transactions Table -->
        <div class="table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Description</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="transactionsTableBody">
              <tr>
                <td colspan="7" class="loading">Loading transactions...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
          <button onclick="changePage('prev')" id="prevBtn">
            <i class="fa-solid fa-chevron-left"></i> Previous
          </button>
          <span id="pageInfo">Page 1 of 1</span>
          <button onclick="changePage('next')" id="nextBtn">
            Next <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="../AdminFiles/script.js"></script>
  </body>
</html>
