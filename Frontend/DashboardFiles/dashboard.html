<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="dashMenu">
        <!-- sidbar menu  -->
        <div class="sidbarMenu">
            <a class="DashNav" href="../Indexfiles/Index.html">
                <b>Group 3</b>
                <p class="logoText">23se17 || 23se16</p>
            </a>
            <div class="sidbarSubMenu">
                <div class="menuBtn">
                    <a href="../TransactionFile/transactions.html">
                        <i class="fa-solid fa-money-bill-transfer"></i>
                        <p>Transaction</p>
                    </a>
                    <a href="../AddTransactionFile/add-transational.html">
                        <i class="fa-solid fa-file-circle-plus"></i>
                        <p>Add-Transaction</p>
                    </a>
                </div>
                <div class="logoutMenu">
                    <a href="Logout">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <p>Logout</p>
                    </a>
                </div>
            </div>
        </div>

        <!-- right content  -->
        <div class="dashContent">
            <h1>Welcome to Expense Tracker</h1>
            <div class="dashData">
                <div class="box1">
                    <div>
                        <h2>Total Income</h2>
                        <p>$145</p>
                    </div>
                    <i class="fa-solid fa-money-bill-1-wave"></i>
                </div>

                <div class="box1">
                    <div>
                        <h2>Total Expenses</h2>
                        <p>$45</p>
                    </div>
                    <i class="fa-solid fa-credit-card"></i>
                </div>

                <div class="box1">
                    <div>
                        <h2>Remaining Balance</h2>
                        <p>$100</p>
                    </div>
                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
