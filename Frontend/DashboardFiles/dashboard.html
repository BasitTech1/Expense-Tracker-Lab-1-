<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../DashboardFiles/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="dashMenu">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Group 3</h2>
                <span>23se17 || 23se16</span>
            </div>
            <div class="sidebar-menu">
                <a href="../IndexFiles/Index.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a class="active" href="../DashboardFiles/dashboard.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>Dashboard</span>
                </a>
                <a href="../TransactionFile/transactions.html">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <span>Transactions</span>
                </a>
                <a href="../AddTransactionFile/add-transational.html">
                    <i class="fa-solid fa-file-circle-plus"></i>
                    <span>Add Transaction</span>
                </a>
                <a href="#">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Profile Settings</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#" onclick="logout(event)">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <!-- right content  -->
        <div class="dashContent">
            <h1>Welcome to Expense Tracker</h1>
            <div class="dashData">
                <div class="box1">
                    <div>
                        <h2>Total Income</h2>
                        <p id="totalIncome">$0</p>
                    </div>
                    <i class="fa-solid fa-money-bill-1-wave"></i>
                </div>

                <div class="box1">
                    <div>
                        <h2>Total Expenses</h2>
                        <p id="totalExpenses">$0</p>
                    </div>
                    <i class="fa-solid fa-credit-card"></i>
                </div>

                <div class="box1">
                    <div>
                        <h2>Remaining Balance</h2>
                        <p id="remainingBalance">$0</p>
                    </div>
                    <i class="fa-solid fa-arrow-down-wide-short"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="../DashboardFiles/script.js"></script>
</body>

</html>
