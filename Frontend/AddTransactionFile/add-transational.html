<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add-Transaction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="dashMenu">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Group 3</h2>
                <span>23se17 || 23se16</span>
            </div>
            <div class="sidebar-menu">
                <a href="../IndexFiles/Index.html">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
                <a href="../DashboardFiles/dashboard.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span>Dashboard</span>
                </a>
                <a href="../TransactionFile/transactions.html">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <span>Transactions</span>
                </a>
                <a class="active" href="../AddTransactionFile/add-transational.html">
                    <i class="fa-solid fa-file-circle-plus"></i>
                    <span>Add Transaction</span>
                </a>
                <a href="../ProfileSetting/profile.html">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Profile Settings</span>
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#" onclick="logout(event)">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <div class="addContent">

            <h2>Add a new income or Expense </h2>
            <form id="transactionForm">
                <div class="form1">
                    <label>Transaction Type</label>
                    <select id="transactionType">
                        <option value="Income">Income</option>
                        <option value="Expense">Expense</option>
                    </select>
                </div>
                <div class="form2">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="$452" required>
                </div>
                <div class="form3">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form4">
                    <label>Description</label>
                    <textarea id="description" rows="2"></textarea>
                </div>
                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <script src="Script.js"></script>
</body>

</html>
