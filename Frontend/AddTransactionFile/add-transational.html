<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add-Transaction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <div class="dashMenu">

        <!-- sidbar menu  -->
        <div class="sidbarMenu">
            <a class="DashNav" href="/Frontend/Indexfiles/Index.html">
                <b>Group 3</b>
                <p class="logoText">23se17 || 23se16</p>
            </a>
            <div class="sidbarSubMenu">
                <div class="menuBtn">
                    <a href="../DashboardFiles//dashboard.html">
                        <i class="fa-solid fa-sliders"></i>
                        <p>Dashboard</p>
                    </a>
                    <a href="../TransactionFile/transactions.html">
                        <i class="fa-solid fa-money-bill-transfer"></i>
                        <p>Transaction</p>
                    </a>
                    <a href="../AddTransactionFile/add-transational.html">
                        <i class="fa-solid fa-file-circle-plus"></i>
                        <p>Add-Transaction</p>
                    </a>
                </div>
                <div class="logoutMenu">
                    <a href="Logout">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        <p>Logout</p>
                    </a>
                </div>
            </div>
        </div>

        <div class="addContent">

            <h2>Add a new income or Expense </h2>
            <form id="transactionForm">
                <div class="form1">
                    <label>Transaction Type</label>
                    <select id="transactionType">
                        <option value="Income">Income</option>
                        <option value="Expense">Expense</option>
                    </select>
                </div>
                <div class="form2">
                    <label>Amount</label>
                    <input type="number" id="amount" placeholder="$452" required>
                </div>
                <div class="form3">
                    <label>Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form4">
                    <label>Description</label>
                    <textarea id="description" rows="2"></textarea>
                </div>
                <button type="submit">Submit</button>
            </form>

            <!-- Transaction Display Section -->
            <div class="transaction-list">
                <h3>Recent Transactions</h3>
                <div id="transactionsContainer">
                    <!-- Transactions will be displayed here -->
                </div>
            </div>
        </div>
    </div>

    <script src="Script.js"></script>
</body>

</html>
